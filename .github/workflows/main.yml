# .github/workflows/run-turuylevaade-daily.yml
name: run-turuylevaade-daily

on:
  schedule:
    - cron: '5 11 * * *'
  workflow_dispatch: {}

# Sunnib Node 24 kõikidele JS-põhistele actionidele (GitHub eemaldab Node 20
# 16. sept 2026; sunnib selle vaikimisi 2. juunist 2026). Saame eemaldada,
# kui Pages-actionide uuemad versioonid jõuavad natiivselt Node 24 peale.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup SSH agent
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ secrets.UPLOAD_TO_ZONE }}
      run: |
        set -euo pipefail
        install -d -m 700 ~/.ssh
        key_file="$RUNNER_TEMP/upload_to_zone.key"
        printf '%s\n' "$SSH_PRIVATE_KEY" > "$key_file"
        chmod 600 "$key_file"

        eval "$(ssh-agent -a "$RUNNER_TEMP/ssh-agent.sock")"
        ssh-add "$key_file"
        rm -f "$key_file"

        {
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID"
        } >> "$GITHUB_ENV"

    # ssh-keyscan võib tabada hetkelist võrgukatkestust runneri (Azure)
    # ja seppo.ai vahel — vaikimisi 5 s timeout ja üks katse löövad
    # terve pipeline'i maha. Proovime 3 korda, 15 s timeoutiga, 10 s
    # vahedega; õnnestumiseks loeme, kas saime vähemalt ühe host key rea.
    - name: Add server fingerprint
      shell: bash
      env:
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
      run: |
        set -uo pipefail
        tmp_keys="$RUNNER_TEMP/keyscan.out"
        for attempt in 1 2 3; do
          : > "$tmp_keys"
          ssh-keyscan -T 15 -H "$SERVER_HOST" > "$tmp_keys" 2>/dev/null || true
          if [ -s "$tmp_keys" ]; then
            cat "$tmp_keys" >> ~/.ssh/known_hosts
            echo "ssh-keyscan õnnestus katsel $attempt ($(wc -l < "$tmp_keys") rida)."
            exit 0
          fi
          if [ "$attempt" -lt 3 ]; then
            echo "ssh-keyscan katse $attempt ei andnud ühtegi võtit — proovin uuesti..."
            sleep 10
          else
            echo "ssh-keyscan katse $attempt ei andnud ühtegi võtit."
          fi
        done
        echo "::error::ssh-keyscan ebaõnnestus 3 korda — server pole kättesaadav."
        exit 1

    # Statistikaameti inflatsiooni toorcache — väike (~paar KB) RDS fail,
    # mille NAV_kasv.R kirjutab iga eduka päringu järel ja millest see
    # loeb juhul, kui andmed.stat.ee on 3 katsel kättesaamatu (vt
    # get_inflation_data NAV_kasv.R-is). Iga päevane run salvestab uue
    # snapshot'i unikaalse võtmega; restore-keys "inflation-raw-" toob
    # tagasi värskeima olemasoleva. GitHub kustutab kasutamata cache'i
    # pärast 7 päeva, nii et puhastust pole vaja.
    - name: Restore inflation raw cache
      uses: actions/cache@v4
      with:
        path: cache_inflation_raw.rds
        # v1 prefiks võimaldab edaspidi cache'i invalideerida ühe versiooni-
        # bumbiga, kui RDS-i skeem muutub (nt veerunimed read_raw_cache'is).
        key: inflation-raw-v1-${{ github.run_id }}
        restore-keys: |
          inflation-raw-v1-

    - name: Run Analysis and Upload in Docker
      run: |
        docker run --rm \
          --env SSH_AUTH_SOCK=${{ env.SSH_AUTH_SOCK }} \
          --volume "${{ env.SSH_AUTH_SOCK }}:${{ env.SSH_AUTH_SOCK }}" \
          --volume ~/.ssh:/root/.ssh:ro \
          --volume "${{ github.workspace }}:/home/rstudio/project" \
          --workdir "/home/rstudio/project" \
          ghcr.io/iseppo/periodical:main \
          bash -c "
            set -euo pipefail

            echo '--- Temporarily disabling renv by renaming trigger files ---'
            [ -f .Rprofile ] && mv .Rprofile .Rprofile.bak
            [ -d renv ] && mv renv renv.bak

            echo '--- Running canonical pipeline ---'
            Rscript run_turuylevaade.R

            echo '--- Done ---'
          "

    # --- GitHub Pages: avaldame raportid (tuleva juurena, teised failinimega) ---
    - name: Assemble GitHub Pages site
      id: site
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        # turuylevaade ja III_sammas on self-contained HTML-id. tuleva.qmd
        # on self-contained: false, seega viitab tuleva.html kõrval olevatele
        # ressurssidele suhteliste URL-idega (tuleva_files/ kaust libs+chart
        # PNG-dega, tuleva-style.css, video + poster, screenshotid, kihlvedu).
        # Kopeerime kõik need _site'i kõrvale, et Pages versioon töötaks.
        mkdir -p _site
        [ -f tuleva.html ]       && cp tuleva.html       _site/index.html       || echo "::warning::tuleva.html puudub"
        [ -f turuylevaade.html ] && cp turuylevaade.html _site/turuylevaade.html || echo "::warning::turuylevaade.html puudub"
        [ -f III_sammas.html ]   && cp III_sammas.html   _site/III_sammas.html   || echo "::warning::III_sammas.html puudub"
        # tuleva kõrvalressursid (vajalikud, sest tuleva.qmd ei ole
        # self-contained).
        [ -d tuleva_files ] && cp -r tuleva_files _site/ || true
        for f in tuleva-style.css aastane_tulu_animeeritud.mp4 aastane_tulu_tuleva_lhv.png \
                 ekspress_screenshot.png fb_screenshot.png kihlvedu.png; do
          [ -f "$f" ] && cp "$f" _site/ || echo "::warning::tuleva kõrvalfail $f puudub"
        done
        if [ -f _site/index.html ]; then
          echo "ready=true" >> "$GITHUB_OUTPUT"
          ls -la _site
        else
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "::warning::tuleva.html puudub — GitHub Pages jääb eelmisesse seisu"
        fi

    - name: Setup Pages
      if: ${{ always() && steps.site.outputs.ready == 'true' }}
      uses: actions/configure-pages@v5
      with:
        enablement: true

    - name: Upload Pages artifact
      if: ${{ always() && steps.site.outputs.ready == 'true' }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Deploy to GitHub Pages
      id: deployment
      if: ${{ always() && steps.site.outputs.ready == 'true' }}
      uses: actions/deploy-pages@v4

    # --- Heartbeat: hoiab ajastatud töövoo elus ---
    # GitHub keelab ajastatud (schedule) töövood, kui repos pole 60 päeva
    # olnud ühtegi commiti. Kirjutame iga ~30 päeva tagant heartbeat.txt'i
    # tänase kuupäeva ja commitime — nii on repo tegevuseaeg alati värske
    # ja töövoog jääb ajastusse alles. GITHUB_TOKEN'iga tehtud commit
    # uuendab pushed_at ajatemplit, kuid ei käivita uusi töövoogusid
    # (rekursiooni pole karta).
    - name: Heartbeat commit
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        viimane_epoch=0
        if [ -f heartbeat.txt ]; then
          viimane=$(head -n1 heartbeat.txt | tr -dc '0-9-')
          viimane_epoch=$(date -u -d "$viimane" +%s 2>/dev/null || echo 0)
        fi
        vanus_paevades=$(( ( $(date -u +%s) - viimane_epoch ) / 86400 ))
        if [ "$vanus_paevades" -lt 30 ]; then
          echo "Heartbeat on $vanus_paevades päeva vana — uut commiti pole vaja."
          exit 0
        fi
        echo "Heartbeat on $vanus_paevades päeva vana — uuendan."
        date -u +"%Y-%m-%d" > heartbeat.txt
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add heartbeat.txt
        git commit -m "chore: heartbeat $(date -u +%Y-%m-%d)"
        git push

    - name: Stop SSH agent
      if: always()
      shell: bash
      run: |
        if [ -n "${SSH_AGENT_PID:-}" ]; then
          ssh-agent -k
        fi
