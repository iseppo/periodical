# .github/workflows/run-turuylevaade-daily.yml
name: run-turuylevaade-daily

on:
  schedule:
    - cron: '5 11 * * *'
  workflow_dispatch: {}

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup SSH agent
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ secrets.UPLOAD_TO_ZONE }}
      run: |
        set -euo pipefail
        install -d -m 700 ~/.ssh
        key_file="$RUNNER_TEMP/upload_to_zone.key"
        printf '%s\n' "$SSH_PRIVATE_KEY" > "$key_file"
        chmod 600 "$key_file"

        eval "$(ssh-agent -a "$RUNNER_TEMP/ssh-agent.sock")"
        ssh-add "$key_file"
        rm -f "$key_file"

        {
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID"
        } >> "$GITHUB_ENV"

    - name: Add server fingerprint
      run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Run Analysis and Upload in Docker
      run: |
        docker run --rm \
          --env SSH_AUTH_SOCK=${{ env.SSH_AUTH_SOCK }} \
          --volume "${{ env.SSH_AUTH_SOCK }}:${{ env.SSH_AUTH_SOCK }}" \
          --volume ~/.ssh:/root/.ssh:ro \
          --volume "${{ github.workspace }}:/home/rstudio/project" \
          --workdir "/home/rstudio/project" \
          ghcr.io/iseppo/periodical:main \
          bash -c "
            set -euo pipefail

            echo '--- Temporarily disabling renv by renaming trigger files ---'
            [ -f .Rprofile ] && mv .Rprofile .Rprofile.bak
            [ -d renv ] && mv renv renv.bak

            echo '--- Running canonical pipeline ---'
            Rscript run_turuylevaade.R

            echo '--- Done ---'
          "

    - name: Stop SSH agent
      if: always()
      shell: bash
      run: |
        if [ -n "${SSH_AGENT_PID:-}" ]; then
          ssh-agent -k
        fi
