# .github/workflows/run-turuylevaade-daily.yml
name: run-turuylevaade-daily

on:
  schedule:
    - cron: '5 11 * * *'
  workflow_dispatch: {}

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup SSH agent
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ secrets.UPLOAD_TO_ZONE }}
      run: |
        set -euo pipefail
        install -d -m 700 ~/.ssh
        key_file="$RUNNER_TEMP/upload_to_zone.key"
        printf '%s\n' "$SSH_PRIVATE_KEY" > "$key_file"
        chmod 600 "$key_file"

        eval "$(ssh-agent -a "$RUNNER_TEMP/ssh-agent.sock")"
        ssh-add "$key_file"
        rm -f "$key_file"

        {
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID"
        } >> "$GITHUB_ENV"

    - name: Add server fingerprint
      run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Run Analysis and Upload in Docker
      run: |
        docker run --rm \
          --env SSH_AUTH_SOCK=${{ env.SSH_AUTH_SOCK }} \
          --volume "${{ env.SSH_AUTH_SOCK }}:${{ env.SSH_AUTH_SOCK }}" \
          --volume ~/.ssh:/root/.ssh:ro \
          --volume "${{ github.workspace }}:/home/rstudio/project" \
          --workdir "/home/rstudio/project" \
          ghcr.io/iseppo/periodical:main \
          bash -c "
            set -euo pipefail

            echo '--- Temporarily disabling renv by renaming trigger files ---'
            [ -f .Rprofile ] && mv .Rprofile .Rprofile.bak
            [ -d renv ] && mv renv renv.bak

            echo '--- Running canonical pipeline ---'
            Rscript run_turuylevaade.R

            echo '--- Done ---'
          "

    # --- GitHub Pages: avaldame raportid (tuleva juurena, teised failinimega) ---
    - name: Assemble GitHub Pages site
      id: site
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        # Raportid on self-contained HTML-id. tuleva avaldatakse saidi
        # juurena (index.html), turuylevaade ja III_sammas failinimega.
        mkdir -p _site
        [ -f tuleva.html ]       && cp tuleva.html       _site/index.html       || echo "::warning::tuleva.html puudub"
        [ -f turuylevaade.html ] && cp turuylevaade.html _site/turuylevaade.html || echo "::warning::turuylevaade.html puudub"
        [ -f III_sammas.html ]   && cp III_sammas.html   _site/III_sammas.html   || echo "::warning::III_sammas.html puudub"
        if [ -f _site/index.html ]; then
          echo "ready=true" >> "$GITHUB_OUTPUT"
          ls -la _site
        else
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "::warning::tuleva.html puudub — GitHub Pages jääb eelmisesse seisu"
        fi

    - name: Setup Pages
      if: ${{ always() && steps.site.outputs.ready == 'true' }}
      uses: actions/configure-pages@v5
      with:
        enablement: true

    - name: Upload Pages artifact
      if: ${{ always() && steps.site.outputs.ready == 'true' }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Deploy to GitHub Pages
      id: deployment
      if: ${{ always() && steps.site.outputs.ready == 'true' }}
      uses: actions/deploy-pages@v4

    # --- Heartbeat: hoiab ajastatud töövoo elus ---
    # GitHub keelab ajastatud (schedule) töövood, kui repos pole 60 päeva
    # olnud ühtegi commiti. Kirjutame iga ~30 päeva tagant heartbeat.txt'i
    # tänase kuupäeva ja commitime — nii on repo tegevuseaeg alati värske
    # ja töövoog jääb ajastusse alles. GITHUB_TOKEN'iga tehtud commit
    # uuendab pushed_at ajatemplit, kuid ei käivita uusi töövoogusid
    # (rekursiooni pole karta).
    - name: Heartbeat commit
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        viimane_epoch=0
        if [ -f heartbeat.txt ]; then
          viimane=$(head -n1 heartbeat.txt | tr -dc '0-9-')
          viimane_epoch=$(date -u -d "$viimane" +%s 2>/dev/null || echo 0)
        fi
        vanus_paevades=$(( ( $(date -u +%s) - viimane_epoch ) / 86400 ))
        if [ "$vanus_paevades" -lt 30 ]; then
          echo "Heartbeat on $vanus_paevades päeva vana — uut commiti pole vaja."
          exit 0
        fi
        echo "Heartbeat on $vanus_paevades päeva vana — uuendan."
        date -u +"%Y-%m-%d" > heartbeat.txt
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add heartbeat.txt
        git commit -m "chore: heartbeat $(date -u +%Y-%m-%d)"
        git push

    - name: Stop SSH agent
      if: always()
      shell: bash
      run: |
        if [ -n "${SSH_AGENT_PID:-}" ]; then
          ssh-agent -k
        fi
